---
name: Bug Report
about: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: "When I call /api/v1/metrics, the cost field returns..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start llm-pulse with ...
        2. Make a request to ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LLM Pulse Version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: How you're running LLM Pulse and relevant config.
      placeholder: |
        Deployment: Docker / uv run
        LLM_PULSE_METRICS_URL: ...
        LLM_PULSE_SCRAPE_INTERVAL: ...
        Python version: ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (set LLM_PULSE_LOG_LEVEL=debug if needed).
      render: shell
